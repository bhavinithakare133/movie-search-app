<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CineSearch – Movie Explorer</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0a0a0f;
                --surface: #12121a;
                --card: #1a1a26;
                --accent: #e63946;
                --accent2: #f4a261;
                --text: #f0eee8;
                --muted: #888899;
                --border: rgba(255, 255, 255, 0.07);
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: 'DM Sans', sans-serif;
                min-height: 100vh;
                overflow-x: hidden;
            }

            /* Background grain */
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 0;
                opacity: 0.4;
            }

            header {
                position: relative;
                z-index: 10;
                padding: 48px 32px 32px;
                text-align: center;
                border-bottom: 1px solid var(--border);
                background: linear-gradient(
                    180deg,
                    rgba(230, 57, 70, 0.08) 0%,
                    transparent 100%
                );
            }

            .logo {
                font-family: 'Bebas Neue', sans-serif;
                font-size: clamp(48px, 8vw, 80px);
                letter-spacing: 6px;
                background: linear-gradient(
                    135deg,
                    #fff 30%,
                    var(--accent) 100%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                line-height: 1;
            }

            .tagline {
                color: var(--muted);
                font-size: 14px;
                letter-spacing: 3px;
                text-transform: uppercase;
                margin-top: 8px;
            }

            .search-section {
                position: relative;
                z-index: 10;
                max-width: 700px;
                margin: 48px auto 0;
                padding: 0 24px;
            }

            .search-wrapper {
                position: relative;
                display: flex;
                gap: 12px;
            }

            .search-input {
                flex: 1;
                background: var(--surface);
                border: 1.5px solid var(--border);
                border-radius: 12px;
                padding: 16px 20px;
                color: var(--text);
                font-family: 'DM Sans', sans-serif;
                font-size: 16px;
                outline: none;
                transition:
                    border-color 0.2s,
                    box-shadow 0.2s;
            }

            .search-input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.15);
            }

            .search-input::placeholder {
                color: var(--muted);
            }

            .search-btn {
                background: var(--accent);
                color: white;
                border: none;
                border-radius: 12px;
                padding: 16px 28px;
                font-family: 'DM Sans', sans-serif;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition:
                    background 0.2s,
                    transform 0.1s;
                white-space: nowrap;
            }

            .search-btn:hover {
                background: #c1121f;
            }
            .search-btn:active {
                transform: scale(0.97);
            }

            .filter-row {
                display: flex;
                gap: 10px;
                margin-top: 16px;
                flex-wrap: wrap;
            }

            .filter-btn {
                background: var(--surface);
                border: 1.5px solid var(--border);
                border-radius: 99px;
                padding: 7px 18px;
                color: var(--muted);
                font-family: 'DM Sans', sans-serif;
                font-size: 13px;
                cursor: pointer;
                transition: all 0.2s;
            }

            .filter-btn:hover,
            .filter-btn.active {
                border-color: var(--accent);
                color: var(--accent);
                background: rgba(230, 57, 70, 0.08);
            }

            main {
                position: relative;
                z-index: 10;
                max-width: 1200px;
                margin: 0 auto;
                padding: 48px 24px 64px;
            }

            .results-label {
                font-size: 13px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 2px;
                margin-bottom: 24px;
            }

            .results-label span {
                color: var(--accent);
                font-weight: 600;
            }

            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 24px;
            }

            .card {
                background: var(--card);
                border-radius: 16px;
                overflow: hidden;
                border: 1px solid var(--border);
                cursor: pointer;
                transition:
                    transform 0.25s,
                    box-shadow 0.25s,
                    border-color 0.25s;
                animation: fadeUp 0.4s ease both;
            }

            .card:hover {
                transform: translateY(-6px);
                box-shadow:
                    0 20px 40px rgba(0, 0, 0, 0.5),
                    0 0 0 1px var(--accent);
                border-color: var(--accent);
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(24px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .card:nth-child(1) {
                animation-delay: 0.05s;
            }
            .card:nth-child(2) {
                animation-delay: 0.1s;
            }
            .card:nth-child(3) {
                animation-delay: 0.15s;
            }
            .card:nth-child(4) {
                animation-delay: 0.2s;
            }
            .card:nth-child(5) {
                animation-delay: 0.25s;
            }
            .card:nth-child(6) {
                animation-delay: 0.3s;
            }

            .card-poster {
                width: 100%;
                aspect-ratio: 2/3;
                object-fit: cover;
                display: block;
                background: var(--surface);
            }

            .card-no-poster {
                width: 100%;
                aspect-ratio: 2/3;
                background: linear-gradient(135deg, #1a1a2e, #16213e);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 40px;
            }

            .card-body {
                padding: 14px;
            }

            .card-title {
                font-size: 14px;
                font-weight: 600;
                line-height: 1.3;
                margin-bottom: 6px;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            .card-meta {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .card-year {
                font-size: 12px;
                color: var(--muted);
            }

            .card-type {
                font-size: 11px;
                padding: 3px 8px;
                border-radius: 99px;
                background: rgba(244, 162, 97, 0.15);
                color: var(--accent2);
                text-transform: capitalize;
            }

            /* Modal */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.85);
                backdrop-filter: blur(8px);
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                animation: fadeIn 0.2s ease;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            .modal {
                background: var(--card);
                border-radius: 20px;
                border: 1px solid var(--border);
                max-width: 700px;
                width: 100%;
                max-height: 90vh;
                overflow-y: auto;
                animation: slideUp 0.3s ease;
            }

            @keyframes slideUp {
                from {
                    transform: translateY(30px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            .modal-inner {
                display: flex;
                gap: 0;
            }

            .modal-poster {
                width: 240px;
                flex-shrink: 0;
                object-fit: cover;
                border-radius: 20px 0 0 20px;
            }

            .modal-no-poster {
                width: 240px;
                flex-shrink: 0;
                background: linear-gradient(135deg, #1a1a2e, #16213e);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 60px;
                border-radius: 20px 0 0 20px;
            }

            .modal-content {
                padding: 32px;
                flex: 1;
            }

            .modal-close {
                float: right;
                background: rgba(255, 255, 255, 0.1);
                border: none;
                color: white;
                width: 32px;
                height: 32px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s;
            }
            .modal-close:hover {
                background: var(--accent);
            }

            .modal-type {
                font-size: 12px;
                color: var(--accent2);
                text-transform: uppercase;
                letter-spacing: 2px;
                margin-bottom: 10px;
            }

            .modal-title {
                font-family: 'Bebas Neue', sans-serif;
                font-size: 36px;
                letter-spacing: 2px;
                line-height: 1.1;
                margin-bottom: 12px;
            }

            .modal-year {
                color: var(--muted);
                font-size: 14px;
                margin-bottom: 20px;
            }

            .modal-plot {
                font-size: 14px;
                line-height: 1.7;
                color: #ccc;
                margin-bottom: 20px;
            }

            .modal-detail {
                display: flex;
                gap: 8px;
                margin-bottom: 10px;
                font-size: 13px;
            }

            .modal-detail-label {
                color: var(--muted);
                min-width: 70px;
            }

            .modal-detail-value {
                color: var(--text);
                font-weight: 500;
            }

            .rating-badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: rgba(244, 162, 97, 0.15);
                border: 1px solid rgba(244, 162, 97, 0.3);
                border-radius: 8px;
                padding: 6px 14px;
                color: var(--accent2);
                font-weight: 600;
                font-size: 15px;
                margin-bottom: 20px;
            }

            /* Loading */
            .loader {
                display: flex;
                justify-content: center;
                padding: 60px 0;
                gap: 8px;
            }

            .loader span {
                width: 10px;
                height: 10px;
                background: var(--accent);
                border-radius: 50%;
                animation: bounce 0.6s infinite alternate;
            }
            .loader span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .loader span:nth-child(3) {
                animation-delay: 0.4s;
            }

            @keyframes bounce {
                from {
                    transform: translateY(0);
                    opacity: 0.4;
                }
                to {
                    transform: translateY(-16px);
                    opacity: 1;
                }
            }

            .empty-state {
                text-align: center;
                padding: 80px 20px;
                color: var(--muted);
            }

            .empty-state .icon {
                font-size: 64px;
                margin-bottom: 16px;
            }
            .empty-state h3 {
                font-size: 20px;
                color: var(--text);
                margin-bottom: 8px;
            }
            .empty-state p {
                font-size: 14px;
            }

            .error-msg {
                text-align: center;
                color: var(--accent);
                padding: 40px;
                font-size: 15px;
            }

            @media (max-width: 600px) {
                .modal-inner {
                    flex-direction: column;
                }
                .modal-poster,
                .modal-no-poster {
                    width: 100%;
                    border-radius: 20px 20px 0 0;
                    height: 280px;
                }
                .search-wrapper {
                    flex-direction: column;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">MovieSearch</div>
            <div class="tagline">Discover Every Story Ever Told</div>

            <div class="search-section">
                <div class="search-wrapper">
                    <input
                        class="search-input"
                        id="searchInput"
                        type="text"
                        placeholder="Search movies, series, episodes..."
                    />
                    <button class="search-btn" onclick="search()">
                        Search
                    </button>
                </div>
                <div class="filter-row">
                    <button
                        class="filter-btn active"
                        onclick="setType('', this)"
                    >
                        All
                    </button>
                    <button class="filter-btn" onclick="setType('movie', this)">
                        Movies
                    </button>
                    <button
                        class="filter-btn"
                        onclick="setType('series', this)"
                    >
                        Series
                    </button>
                    <button
                        class="filter-btn"
                        onclick="setType('episode', this)"
                    >
                        Episodes
                    </button>
                </div>
            </div>
        </header>

        <main>
            <div
                id="resultsLabel"
                class="results-label"
                style="display: none"
            ></div>
            <div id="app">
                <div class="empty-state">
                    <div class="icon">🎬</div>
                    <h3>Start Your Search</h3>
                    <p>Type a movie or series name above and hit Search</p>
                </div>
            </div>
        </main>

        <!-- Modal -->
        <div
            id="modal"
            class="modal-overlay"
            style="display: none"
            onclick="closeModal(event)"
        >
            <div class="modal" id="modalContent"></div>
        </div>

        <script>
            const API_KEY = 'b9bd48a6';
            let currentType = '';

            document
                .getElementById('searchInput')
                .addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') search();
                });

            function setType(type, btn) {
                currentType = type;
                document
                    .querySelectorAll('.filter-btn')
                    .forEach((b) => b.classList.remove('active'));
                btn.classList.add('active');
            }

            async function search() {
                const query = document
                    .getElementById('searchInput')
                    .value.trim();
                if (!query) return;
                const app = document.getElementById('app');
                const label = document.getElementById('resultsLabel');

                app.innerHTML =
                    '<div class="loader"><span></span><span></span><span></span></div>';
                label.style.display = 'none';

                try {
                    const typeParam = currentType ? `&type=${currentType}` : '';
                    const res = await fetch(
                        `https://www.omdbapi.com/?apikey=${API_KEY}&s=${encodeURIComponent(query)}${typeParam}`,
                    );
                    const data = await res.json();

                    if (data.Response === 'True') {
                        label.style.display = 'block';
                        label.innerHTML = `Found <span>${data.totalResults}</span> results for "${query}"`;
                        app.innerHTML = `<div class="grid">${data.Search.map((m) => movieCard(m)).join('')}</div>`;
                    } else {
                        label.style.display = 'none';
                        app.innerHTML = `<div class="error-msg">😕 ${data.Error || 'No results found.'}</div>`;
                    }
                } catch (e) {
                    app.innerHTML = `<div class="error-msg">⚠️ Network error. Please try again.</div>`;
                }
            }

            function movieCard(m) {
                const poster =
                    m.Poster !== 'N/A'
                        ? `<img class="card-poster" src="${m.Poster}" alt="${m.Title}" loading="lazy"/>`
                        : `<div class="card-no-poster">🎬</div>`;
                return `
      <div class="card" onclick="openModal('${m.imdbID}')">
        ${poster}
        <div class="card-body">
          <div class="card-title">${m.Title}</div>
          <div class="card-meta">
            <span class="card-year">${m.Year}</span>
            <span class="card-type">${m.Type}</span>
          </div>
        </div>
      </div>`;
            }

            async function openModal(id) {
                const modal = document.getElementById('modal');
                const content = document.getElementById('modalContent');
                modal.style.display = 'flex';
                content.innerHTML =
                    '<div class="loader" style="padding:60px 0"><span></span><span></span><span></span></div>';

                const res = await fetch(
                    `https://www.omdbapi.com/?apikey=${API_KEY}&i=${id}&plot=full`,
                );
                const m = await res.json();

                const poster =
                    m.Poster !== 'N/A'
                        ? `<img class="modal-poster" src="${m.Poster}" alt="${m.Title}"/>`
                        : `<div class="modal-no-poster">🎬</div>`;

                const rating =
                    m.imdbRating !== 'N/A'
                        ? `<div class="rating-badge">⭐ ${m.imdbRating} <span style="font-size:11px;color:#aaa">/ 10 IMDB</span></div>`
                        : '';

                content.innerHTML = `
      <div class="modal-inner">
        ${poster}
        <div class="modal-content">
          <button class="modal-close" onclick="closeModal()">✕</button>
          <div class="modal-type">${m.Type}</div>
          <div class="modal-title">${m.Title}</div>
          <div class="modal-year">${m.Year} ${m.Runtime !== 'N/A' ? '· ' + m.Runtime : ''}</div>
          ${rating}
          <div class="modal-plot">${m.Plot !== 'N/A' ? m.Plot : 'No plot available.'}</div>
          ${m.Genre !== 'N/A' ? `<div class="modal-detail"><span class="modal-detail-label">Genre</span><span class="modal-detail-value">${m.Genre}</span></div>` : ''}
          ${m.Director !== 'N/A' ? `<div class="modal-detail"><span class="modal-detail-label">Director</span><span class="modal-detail-value">${m.Director}</span></div>` : ''}
          ${m.Actors !== 'N/A' ? `<div class="modal-detail"><span class="modal-detail-label">Cast</span><span class="modal-detail-value">${m.Actors}</span></div>` : ''}
          ${m.Language !== 'N/A' ? `<div class="modal-detail"><span class="modal-detail-label">Language</span><span class="modal-detail-value">${m.Language}</span></div>` : ''}
        </div>
      </div>`;
            }

            function closeModal(e) {
                if (!e || e.target === document.getElementById('modal')) {
                    document.getElementById('modal').style.display = 'none';
                }
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape')
                    document.getElementById('modal').style.display = 'none';
            });
        </script>
    </body>
</html>
